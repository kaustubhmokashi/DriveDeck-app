<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DriveDeck Pairing</title>
    <link rel="stylesheet" href="/remote.css" />
  </head>
  <body>
    <main class="remote-page">
      <p class="remote-eyebrow">DriveDeck Pairing</p>
      <h1>Send a Google Drive folder to your TV.</h1>
      <div class="remote-result">
        <p class="remote-result-label">Your Pairing Code</p>
        <div class="remote-code-row">
          <p id="remote-code" class="remote-code">---------</p>
          <button id="copy-code-button" type="button" class="remote-copy-button" aria-label="Copy code">
            Copy
          </button>
        </div>
      </div>

      <form id="remote-form" class="remote-form">
        <label for="remote-url">Google Drive folder link</label>
        <textarea
          id="remote-url"
          name="remote-url"
          rows="4"
          placeholder="https://drive.google.com/drive/folders/..."
          required
        ></textarea>
        <div class="remote-code-type" role="radiogroup" aria-label="Code type">
          <label class="remote-code-type-option">
            <input type="radio" name="code-type" value="temporary" checked />
            <span>6 digit temporary code</span>
          </label>
          <label class="remote-code-type-option">
            <input type="radio" name="code-type" value="permanent" />
            <span>9 digit permanent code</span>
          </label>
        </div>
        <button type="submit">Create Code</button>
      </form>
      <button id="new-code-button" type="button" class="remote-tertiary-button hidden">
        Create Another Code
      </button>

      <p class="remote-expiry-note">
        6 digit codes stay active for 2 days. 9 digit codes stay active until you change or remove the folder.
      </p>
      <p id="remote-status" class="remote-status"></p>
    </main>

    <script src="/remote.js"></script>
  </body>
</html>
